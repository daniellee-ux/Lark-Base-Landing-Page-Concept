<!DOCTYPE html>
<!--
  Lark Base AI Agent — single-screen hero.
  Looping title animation built on GSAP + SplitText (CDN, gsap 3.13.0, no build step):
    • SplitText splits each phrase into per-character spans
    • one timeline does the typewriter + per-character blur-in as a staggered cascade
    • caret, shimmer sweep and exit are GSAP tweens
  Each character carries its own measured "slice" of one phrase-wide gradient, so the
  gradient stays continuous across characters while each char blurs/transforms on its own.
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lark Base - AI Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --page-w: 1728px;
      --blue: #3f78ff;
      --blue-light: #7ab2ff;
      --text: #f4f8ff;
      --muted: rgba(191, 201, 219, 0.58);
      --nav: rgba(8, 12, 24, 0.82);
      --card-ease: cubic-bezier(0.65, 0, 0.35, 1);
      --title-grad: linear-gradient(90deg, #edf6ff 0%, #cfe5ff 28%, #94c3ff 54%, #65a8ff 74%, #3d86ff 100%);
    }

    html,
    body {
      min-height: 100%;
      background: #000;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 805px;
      overflow: hidden;
      background:
        radial-gradient(ellipse 660px 150px at 50% -4%, rgba(45, 103, 255, 0.38), transparent 72%),
        radial-gradient(ellipse 940px 250px at 50% 5%, rgba(30, 83, 211, 0.28), transparent 72%),
        linear-gradient(90deg, #020305 0%, #020814 18%, #06122c 50%, #020814 82%, #020305 100%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 820px 270px at 50% 9%, rgba(31, 104, 255, 0.27), transparent 70%),
        radial-gradient(ellipse 1240px 440px at 50% 58%, rgba(0, 0, 0, 0) 10%, #000 73%),
        linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, #000 76%);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 61px;
      left: 50%;
      width: 906px;
      height: 248px;
      transform: translateX(-50%);
      opacity: 0.26;
      background-image: radial-gradient(circle, rgba(63, 120, 255, 0.72) 0 1.15px, transparent 1.3px);
      background-size: 7.12px 7.12px;
      mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.75) 30%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.75) 30%, transparent 100%);
      pointer-events: none;
    }

    .nav {
      position: relative;
      z-index: 4;
      height: 60px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.9), var(--nav) 50%, rgba(0, 0, 0, 0.9));
    }

    .nav-inner {
      width: min(1376px, calc(100% - 80px));
      height: 60px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left,
    .nav-links,
    .nav-user {
      display: flex;
      align-items: center;
    }

    .nav-left {
      gap: 73px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 21px;
      font-weight: 700;
      white-space: nowrap;
    }

    .mark {
      position: relative;
      width: 26px;
      height: 26px;
      transform: rotate(45deg);
    }

    .mark span {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: linear-gradient(135deg, #9f55ff 0%, #5f32ff 100%);
    }

    .mark span:nth-child(1) { left: 0; top: 0; }
    .mark span:nth-child(2) { right: 0; top: 0; }
    .mark span:nth-child(3) { left: 0; bottom: 0; }
    .mark span:nth-child(4) { right: 0; bottom: 0; }

    .nav-links {
      gap: 40px;
      color: rgba(245, 248, 255, 0.92);
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      white-space: nowrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chevron {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid rgba(245, 248, 255, 0.7);
      transform: translateY(1px);
    }

    .nav-user {
      gap: 28px;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-name {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.88);
    }

    .user-name .chevron {
      border-left-width: 5px;
      border-right-width: 5px;
      border-top-width: 7px;
      border-top-color: rgba(245, 248, 255, 0.5);
    }

    .nav-cta {
      height: 36px;
      min-width: 100px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      color: #fff;
      background: linear-gradient(180deg, #467eff 0%, #2f6df3 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .headline {
      position: relative;
      z-index: 2;
      width: min(900px, calc(100% - 48px));
      margin: 60px auto 0;
      text-align: center;
    }

    .headline h1 {
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f3f7ff;
      font-size: 64px;
      font-weight: 600;
      line-height: 1.31;
      letter-spacing: 0;
    }

    .headline h1 .second {
      position: relative;
      display: block;
      min-height: 84px;
    }

    /* Title line — GSAP/SplitText drives the reveal, so .char carries NO initial
       hidden state or transition here (the timeline supplies the from-values).
       It keeps only the per-character gradient slice; the shimmer is a single
       overlay element (.shimmer), not a per-char background sweep. */
    .type-text {
      position: relative;
      display: inline-block;
      min-width: 5em;
      text-align: center;
      white-space: nowrap;
      color: #cfe5ff;            /* pre-JS fallback colour only */
      transform: translateZ(0);
    }

    .char {
      display: inline-block;
      color: transparent;
      -webkit-text-fill-color: transparent;
      background-image: var(--title-grad);
      background-repeat: no-repeat;
      background-size: var(--grad-w, 100%) 100%;
      background-position: calc(-1 * var(--x, 0px)) 0;
      -webkit-background-clip: text;
      background-clip: text;
      will-change: opacity, filter, transform;
    }

    /* Shimmer: one overlay copy of the phrase, swept once by a single CSS layer. */
    .shimmer {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      color: transparent;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(100deg, transparent 42%, rgba(255, 255, 255, 0.92) 50%, transparent 58%);
      background-repeat: no-repeat;
      background-size: 280% 100%;
      background-position: 150% 0;
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0;
    }

    .type-text.is-shimmer .shimmer {
      animation: title-sheen var(--shimmer-dur, 700ms) ease-out;
    }

    @keyframes title-sheen {
      0% { opacity: 0; background-position: 150% 0; }
      14% { opacity: 1; }
      86% { opacity: 1; }
      100% { opacity: 0; background-position: -150% 0; }
    }

    /* Trail star — one bead of the spiral comet. Transform + opacity only (no filters
       on moving nodes), so the trail stays on the compositor and doesn't jank. */
    .sparkle {
      position: absolute;
      top: 0;
      left: 0;
      width: 16px;
      height: 16px;
      margin: -8px 0 0 -8px;        /* center on its (x, y) */
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
      /* soft halo baked into the element (not an animated filter) */
      background: radial-gradient(circle, var(--accent, #a0c8ff) 0%, transparent 62%);
    }

    .sparkle::before {
      content: "";
      position: absolute;
      inset: 3px;                   /* 4-point star core */
      background: linear-gradient(180deg, #ffffff 0%, var(--accent, #6aa8ff) 100%);
      clip-path: polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
    }

    /* Spiral star trail — an INVISIBLE sine path is the trajectory; a comet of stars
       rides it, switching between these two layers (back behind text, front in front)
       so the trail appears to wrap around the characters. */
    .trail-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .trail-back { z-index: -1; }     /* trail stars currently behind the characters */
    .trail-front { z-index: 1; }     /* trail stars currently in front */

    /* GSAP-driven caret: absolutely positioned, advanced via translateX per step */
    .gsap-caret {
      position: absolute;
      left: 0;
      top: 50%;
      width: 3px;
      height: 0.92em;
      margin-top: -0.5em;
      border-radius: 2px;
      background: linear-gradient(180deg, #cfe5ff 0%, #4f95ff 100%);
      box-shadow: 0 0 12px rgba(99, 168, 255, 0.85);
      pointer-events: none;
    }

    .subtitle {
      margin-top: 20px;
      color: rgba(197, 207, 223, 0.58);
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
    }

    .hero-button {
      position: relative;
      z-index: 3;
      width: 164px;
      height: 62px;
      margin: 42px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 62px;
      background:
        radial-gradient(163.46% 163.46% at 50% 32.69%, rgba(0, 74, 247, 0.2) 0%, rgba(189, 209, 255, 0) 100%),
        linear-gradient(180deg, #69a5ff -19.17%, #185dff 10.62%, #7ba2ff 100%);
      box-shadow: inset 0 -1px 5px rgba(255, 255, 255, 0.55);
      color: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 28px;
    }

    .hero-button::before,
    .hero-button::after {
      content: "";
      position: absolute;
      left: 50%;
      z-index: -1;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #3067e6;
      filter: blur(15.45px);
    }

    .hero-button::before {
      top: 38px;
      width: 170px;
      height: 36px;
      opacity: 0.6;
    }

    .hero-button::after {
      top: 48px;
      width: 104px;
      height: 19px;
    }

    .showcase {
      position: relative;
      z-index: 2;
      width: 1251px;
      max-width: calc(100% - 160px);
      height: 350px;
      margin: 19px auto 0;
    }

    .cards {
      position: absolute;
      left: 50%;
      top: 20px;
      width: 1100px;
      height: 269px;
      transform: translateX(-50%);
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .cards::after {
      content: "";
      position: absolute;
      inset: -28px -60px -34px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.51) 0%, transparent 24%, transparent 76%, rgba(0, 0, 0, 0.51) 100%);
      pointer-events: none;
      z-index: 6;
    }

    .panel {
      position: absolute;
      left: 347px;
      top: 0;
      width: 406px;
      height: 269px;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backface-visibility: hidden;
      contain: layout paint;
      transform-origin: center center;
      will-change: opacity, transform;
      transition:
        opacity 760ms var(--card-ease),
        transform 760ms var(--card-ease);
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease 360ms;
      z-index: 2;
    }

    .panel.is-side {
      opacity: 0.78;
      z-index: 1;
    }

    .panel.is-left {
      transform: translate3d(-430px, 0, -150px) scale(0.788) rotateY(-6deg);
    }

    .panel.is-left::after,
    .panel.is-exit-left::after {
      opacity: 1;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0.28) 18%, transparent 44%);
    }

    .panel.is-right {
      transform: translate3d(430px, 0, -150px) scale(0.788) rotateY(6deg);
    }

    .panel.is-right::after,
    .panel.is-incoming::after {
      opacity: 1;
      background: linear-gradient(270deg, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0.28) 18%, transparent 44%);
    }

    .panel.is-center {
      opacity: 1;
      z-index: 4;
      transform: translate3d(0, 0, 60px) scale(1) rotateY(0deg);
    }

    .panel.is-incoming {
      opacity: 0;
      z-index: 0;
      transform: translate3d(860px, 0, -210px) scale(0.788) rotateY(8deg);
    }

    .panel.is-exit-left {
      opacity: 0;
      z-index: 0;
      transform: translate3d(-860px, 0, -210px) scale(0.788) rotateY(-8deg);
    }

    .panel-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      user-select: none;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .fade {
      position: absolute;
      top: 0;
      width: 298px;
      height: 350px;
      pointer-events: none;
    }

    .fade.left {
      left: 0;
      background: linear-gradient(90deg, #000 0%, rgba(0, 0, 0, 0.46) 38%, transparent 100%);
      z-index: 8;
    }

    .fade.right {
      right: 0;
      background: linear-gradient(270deg, #000 0%, rgba(0, 0, 0, 0.46) 38%, transparent 100%);
      z-index: 8;
    }

    @media (max-width: 1180px) {
      .nav-inner {
        width: calc(100% - 48px);
      }

      .nav-left {
        gap: 38px;
      }

      .nav-links {
        gap: 24px;
        font-size: 14px;
      }

      .nav-user {
        gap: 18px;
      }

      .headline h1 {
        font-size: 56px;
      }

      .showcase {
        max-width: calc(100% - 48px);
      }

      .cards {
        transform: translateX(-50%) scale(0.9);
        transform-origin: top center;
      }
    }

    @media (max-width: 780px) {
      .hero {
        min-height: 760px;
      }

      .nav-inner {
        width: calc(100% - 32px);
      }

      .nav-links,
      .user-name {
        display: none;
      }

      .brand {
        font-size: 19px;
      }

      .headline {
        margin-top: 82px;
      }

      .headline h1 {
        font-size: 44px;
        line-height: 1.25;
      }

      .headline h1 .second {
        min-height: 55px;
      }

      .subtitle {
        margin-top: 18px;
      }

      .hero-button {
        margin-top: 38px;
      }

      .showcase {
        height: 300px;
        margin-top: 28px;
      }

      .cards {
        transform: translateX(-50%) scale(0.62);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .panel {
        transition: none;
      }

      .gsap-caret {
        display: none;
      }
    }

    /* live config panel (Tweakpane) — keep it above the page, just below the 60px nav */
    .tp-dfwv {
      z-index: 9999 !important;
      top: 68px !important;
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Lark Base AI Agent landing page">
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-left">
          <div class="brand" aria-label="Lark Base">
            <div class="mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span>Lark Base</span>
          </div>
          <div class="nav-links" aria-label="Primary navigation">
            <span>多维表格 AI</span>
            <span class="nav-link">应用市场<i class="chevron" aria-hidden="true"></i></span>
            <span class="nav-link">解决方案<i class="chevron" aria-hidden="true"></i></span>
            <span class="nav-link">资源<i class="chevron" aria-hidden="true"></i></span>
            <span>价格</span>
            <span>社区</span>
          </div>
        </div>
        <div class="nav-user">
          <span class="user-name">李天天<i class="chevron" aria-hidden="true"></i></span>
          <span class="nav-cta">免费使用</span>
        </div>
      </div>
    </nav>

    <section class="headline">
      <h1>
        <span>用 AI Agent</span>
        <span class="second" aria-live="polite">
          <span class="type-text">搭专业系统</span>
        </span>
      </h1>
      <p class="subtitle">全新工作方式，开启智能未来</p>
    </section>

    <div class="hero-button">免费使用</div>

    <section class="showcase" aria-label="Product preview">
      <div class="cards">
        <div class="panel is-side is-left" data-panel="0"></div>
        <div class="panel is-center" data-panel="1"></div>
        <div class="panel is-side is-right" data-panel="2"></div>
        <div class="panel is-incoming" data-panel="3"></div>
      </div>
      <div class="fade left"></div>
      <div class="fade right"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.10/dist/tweakpane.min.js"></script>
  <script>
    const slides = [
      { title: "跑业务流程", image: "assets/card-left.png", alt: "Business workflow preview", gradient: "linear-gradient(90deg, #ffffff 0%, #e8fff4 45%, #5fe0a3 76%, #15c774 100%)" },
      { title: "搭专业系统", image: "assets/card-center.png", alt: "Professional system builder preview", gradient: "linear-gradient(90deg, #ffffff 0%, #f1e8ff 45%, #b88fff 76%, #7a45ff 100%)" },
      { title: "生成公式", image: "assets/card-right.png", alt: "Formula generation preview", gradient: "linear-gradient(90deg, #ffffff 0%, #fff2e6 45%, #ffab63 76%, #ff7d1f 100%)" },
    ];

    const typeText = document.querySelector(".type-text");
    const panels = Array.from(document.querySelectorAll(".panel[data-panel]"));
    const slotClasses = ["is-side", "is-left", "is-center", "is-right", "is-incoming", "is-exit-left"];
    const slideTime = 760;
    // ---- title animation config — toggle/tune each effect here ----------
    const CONFIG = {
      typewriter: { enabled: true, speed: 0.092, charDuration: 0.34 },            // char-by-char reveal
      blur:       { enabled: true, amount: 4, rise: 14 },                         // per-char blur-in (+ slight rise)
      caret:      { enabled: true, blink: 0.5 },                                  // blinking type cursor
      shimmer:    { enabled: true, duration: 0.7 },                               // highlight sweep on settle (seconds)
      trail:      { enabled: true, density: 0.035, fadeOut: 0.5, amplitude: 34 }, // spiral star trail
      loop:       { hold: 1.98 },                                                 // seconds each phrase holds before switching
    };

    // snapshot of the defaults so the panel's Reset button can restore them
    const DEFAULTS = JSON.parse(JSON.stringify(CONFIG));

    const settleDelay = 0.15; // pause after typing before the shimmer
    let activeIndex = 1;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    gsap.registerPlugin(SplitText);

    slides.forEach((slide) => {
      const img = new Image();
      img.decoding = "async";
      img.src = slide.image;
    });

    function normalizedIndex(index) {
      return (index + slides.length) % slides.length;
    }

    function panelMarkup(slide) {
      return `<img class="panel-image" src="${slide.image}" alt="${slide.alt}">`;
    }

    function applyPanel(panel, slot, slideIndex) {
      panel.classList.remove(...slotClasses);
      if (slot === "is-center") {
        panel.classList.add("is-center");
      } else if (slot === "is-left") {
        panel.classList.add("is-side", "is-left");
      } else if (slot === "is-right") {
        panel.classList.add("is-side", "is-right");
      } else if (slot === "is-incoming") {
        panel.classList.add("is-incoming");
      } else {
        panel.classList.add("is-exit-left");
      }

      const nextSlideIndex = normalizedIndex(slideIndex);
      if (panel.dataset.slideIndex !== String(nextSlideIndex)) {
        panel.innerHTML = panelMarkup(slides[nextSlideIndex]);
        panel.dataset.slideIndex = String(nextSlideIndex);
      }
    }

    function renderPanels(index) {
      applyPanel(panels[0], "is-left", index - 1);
      applyPanel(panels[1], "is-center", index);
      applyPanel(panels[2], "is-right", index + 1);
      applyPanel(panels[3], "is-incoming", index + 2);
    }

    function slidePanels(nextIndex) {
      const transitionPlan = [
        ["is-exit-left", nextIndex - 2],
        ["is-left", nextIndex - 1],
        ["is-center", nextIndex],
        ["is-right", nextIndex + 1],
      ];

      panels.forEach((panel, i) => applyPanel(panel, transitionPlan[i][0], transitionPlan[i][1]));

      window.setTimeout(() => {
        panels.push(panels.shift());
        renderPanels(nextIndex);
      }, slideTime);
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function nextFrame() {
      return new Promise((resolve) => window.requestAnimationFrame(resolve));
    }

    // ---- title (GSAP + SplitText) -----------------------------------------

    const caret = document.createElement("span");
    caret.className = "gsap-caret";
    caret.setAttribute("aria-hidden", "true");

    const shimmer = document.createElement("span");
    shimmer.className = "shimmer";
    shimmer.setAttribute("aria-hidden", "true");

    // spiral star trail: two layers — back (behind the chars) and front (in front) —
    // hold the trail stars; the sine path itself is invisible, just the trajectory.
    const trailBack = document.createElement("div");
    trailBack.className = "trail-layer trail-back";
    trailBack.setAttribute("aria-hidden", "true");
    const trailFront = document.createElement("div");
    trailFront.className = "trail-layer trail-front";
    trailFront.setAttribute("aria-hidden", "true");

    // sample the invisible sine coil across the current phrase (type-text coords);
    // `front` = which half of each loop the point is on (depth = cos(phase) >= 0).
    function computeSpiral(chars) {
      if (!chars.length) return [];
      const ttRect = typeText.getBoundingClientRect();
      const H = ttRect.height;
      const x0 = chars[0].getBoundingClientRect().left - ttRect.left;
      const x1 = chars[chars.length - 1].getBoundingClientRect().right - ttRect.left;
      const span = Math.max(1, x1 - x0);
      const midY = H / 2;
      const amp = Math.min(CONFIG.trail.amplitude, H * 0.42);
      const loops = Math.max(3, Math.round(span / 95));
      const steps = loops * 40;
      const pts = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const phase = t * loops * Math.PI * 2;
        pts.push({ x: x0 + t * span, y: midY + amp * Math.sin(phase), front: Math.cos(phase) >= 0 });
      }
      return pts;
    }

    function spiralAt(pts, u) {
      const f = Math.max(0, Math.min(1, u)) * (pts.length - 1);
      const i = Math.floor(f), j = Math.min(pts.length - 1, i + 1), r = f - i;
      const a = pts[i], b = pts[j];
      return { x: a.x + (b.x - a.x) * r, y: a.y + (b.y - a.y) * r, front: r < 0.5 ? a.front : b.front };
    }

    // The emit point sweeps the spiral (synced to `dur`), dropping stars as it goes.
    // Each dropped star stays where it landed and fades out on ITS OWN over `fadeDur`,
    // so the trail dissolves star-by-star — the per-star fade is the slow disappearance.
    function runSpiralTrail(chars, dur) {
      trailBack.replaceChildren();
      trailFront.replaceChildren();
      if (reduceMotion) return;
      const pts = computeSpiral(chars);
      if (!pts.length) return;
      const emitStep = CONFIG.trail.density;  // drop a star every N of the path (smaller = denser)
      const fadeDur = CONFIG.trail.fadeOut;   // how long EACH star takes to fade out (bigger = slower)
      const proxy = { p: 0 };
      let nextEmit = 0;
      gsap.to(proxy, {
        p: 1,
        duration: dur,
        ease: "none",
        onUpdate() {
          while (nextEmit <= proxy.p) {
            const pt = spiralAt(pts, nextEmit);
            nextEmit += emitStep;
            const el = document.createElement("span");
            el.className = "sparkle";
            (pt.front ? trailFront : trailBack).appendChild(el);   // weave in front / behind text
            const sc = gsap.utils.random(0.55, 1.1);
            gsap.set(el, { x: pt.x, y: pt.y, scale: sc, rotation: gsap.utils.random(-40, 40), opacity: 0 });
            gsap.timeline({ onComplete: () => el.remove() })
              .to(el, { opacity: 1, duration: 0.12, ease: "power1.out" }, 0)
              .to(el, { opacity: 0, scale: sc * 0.55, y: pt.y - gsap.utils.random(2, 9), duration: fadeDur, ease: "power1.in" }, 0.1);
          }
        },
      });
    }

    let currentSplit = null;
    let caretBlink = null;

    // Map one phrase-wide gradient onto the split chars (the slice technique).
    // rect-based offsets stay correct regardless of how SplitText nests elements.
    function layoutGradient() {
      if (!currentSplit || !currentSplit.chars.length) return;
      const ttRect = typeText.getBoundingClientRect();
      typeText.style.setProperty("--grad-w", ttRect.width + "px");
      currentSplit.chars.forEach((c) => {
        const r = c.getBoundingClientRect();
        c.style.setProperty("--x", (r.left - ttRect.left) + "px");
      });
    }

    function stopCaretBlink() {
      if (caretBlink) {
        caretBlink.kill();
        caretBlink = null;
      }
      gsap.set(caret, { opacity: 1 });
    }

    function startCaretBlink() {
      stopCaretBlink();
      caretBlink = gsap.to(caret, {
        opacity: 0,
        duration: CONFIG.caret.blink,
        repeat: -1,
        yoyo: true,
        ease: "power1.inOut",
        delay: 0.25,
      });
    }

    // One-shot highlight: a single overlay layer swept by CSS (off the per-frame path).
    function runShimmer() {
      if (reduceMotion) return;
      shimmer.style.setProperty("--shimmer-dur", CONFIG.shimmer.duration + "s"); // read live
      typeText.classList.remove("is-shimmer");
      void typeText.offsetWidth;            // restart the CSS animation
      typeText.classList.add("is-shimmer");
    }

    function splitPhrase(text) {
      typeText.textContent = text;            // wipe old chars (and detached caret/shimmer)
      currentSplit = new SplitText(typeText, { type: "chars", charsClass: "char" });
      layoutGradient();
      shimmer.textContent = text;             // overlay copy of the phrase (hidden until swept)
      if (CONFIG.trail.enabled) typeText.appendChild(trailBack);   // trail stars behind the chars
      typeText.appendChild(shimmer);
      if (CONFIG.caret.enabled) typeText.appendChild(caret);       // caret rides along after the chars
      if (CONFIG.trail.enabled) typeText.appendChild(trailFront);  // trail stars in front of the chars
      return currentSplit.chars;
    }

    function typePhrase(text) {
      // read live so the config panel takes effect on the next phrase
      const typeStep = CONFIG.typewriter.enabled ? CONFIG.typewriter.speed : 0; // 0 → all chars at once
      const charDur = CONFIG.typewriter.charDuration;
      typeText.classList.remove("is-shimmer");
      gsap.set(typeText, { opacity: 1, filter: "blur(0px)" });
      const chars = splitPhrase(text);
      if (CONFIG.caret.enabled) { stopCaretBlink(); gsap.set(caret, { opacity: 1, x: 0 }); }

      const tl = gsap.timeline();
      // opacity fade-in is the reveal; blur + rise are the optional per-char "materialize".
      const reveal = { opacity: 0, duration: charDur, ease: "power2.out", stagger: typeStep };
      if (CONFIG.blur.enabled) reveal.filter = `blur(${CONFIG.blur.amount}px)`;
      tl.from(chars, reveal, 0);
      if (CONFIG.blur.enabled) {
        // fast ease so the rise settles while the char is still faint → the lift reads as tiny
        tl.from(chars, { yPercent: CONFIG.blur.rise, duration: charDur, ease: "expo.out", stagger: typeStep }, 0);
      }

      // caret hops to each character's trailing edge as it lands
      if (CONFIG.caret.enabled) {
        chars.forEach((c, i) => {
          const left = c.getBoundingClientRect().left - typeText.getBoundingClientRect().left;
          tl.set(caret, { x: left + c.offsetWidth }, i * typeStep);
        });
      }

      // comet sweeps at the typewriter's pace (span = char-to-char time) so it keeps up
      if (CONFIG.trail.enabled) {
        const drawDur = Math.max((chars.length - 1) * typeStep, 0.2);
        gsap.set([trailBack, trailFront], { opacity: 1 });
        tl.call(() => runSpiralTrail(chars, drawDur), null, 0);
      }

      if (CONFIG.caret.enabled) tl.add(startCaretBlink);   // begin blinking once typed
      tl.to({}, { duration: settleDelay });                // settle
      if (CONFIG.shimmer.enabled) tl.add(runShimmer);      // sweep (plays into the hold)
      return tl.then();
    }

    function fadePhrase() {
      if (CONFIG.caret.enabled) { stopCaretBlink(); gsap.to(caret, { opacity: 0, duration: 0.2 }); }
      return gsap
        .to(typeText, { opacity: 0, filter: "blur(7px)", duration: 0.3, ease: "power2.in" })
        .then();
    }

    // recolor the title to match the centered card (per-card gradient via --title-grad,
    // which every .char already reads — merged from master's carousel-synced coloring)
    function applyGradient(index) {
      const grad = slides[normalizedIndex(index)].gradient;
      typeText.style.setProperty("--title-grad", grad);
      // the gradient's last colour is the card accent — match the trail stars to it
      const accent = (grad.match(/#[0-9a-fA-F]{6}(?=[^#]*$)/) || ["#6aa8ff"])[0];
      typeText.style.setProperty("--accent", accent);
    }

    async function runHeroLoop() {
      renderPanels(activeIndex);
      applyGradient(activeIndex);
      await typePhrase(slides[activeIndex].title);
      await wait(CONFIG.loop.hold * 1000);

      while (true) {
        await fadePhrase();
        activeIndex = (activeIndex + 1) % slides.length;
        applyGradient(activeIndex);
        await Promise.all([
          typePhrase(slides[activeIndex].title),
          (async () => {
            await nextFrame();
            slidePanels(activeIndex);
            await wait(slideTime);
          })(),
        ]);
        await wait(CONFIG.loop.hold * 1000);
      }
    }

    window.addEventListener("resize", layoutGradient);

    if (reduceMotion) {
      renderPanels(activeIndex);
      applyGradient(activeIndex);
      splitPhrase(slides[activeIndex].title);
      caret.remove();
    } else {
      runHeroLoop();
    }

    // ---- live config panel (Tweakpane) — add ?config (or #config) to the URL to show it ----
    // Loads from CDN; if it's unavailable the page just runs without the panel.
    if (window.Tweakpane && (location.search + location.hash).includes("config")) {
      const pane = new Tweakpane.Pane({ title: "Title FX" });

      const ft = pane.addFolder({ title: "打字机 Typewriter" });
      ft.addInput(CONFIG.typewriter, "enabled", { label: "enabled" });
      ft.addInput(CONFIG.typewriter, "speed", { min: 0.02, max: 0.25, step: 0.005, label: "speed (s/char)" });
      ft.addInput(CONFIG.typewriter, "charDuration", { min: 0.1, max: 2, step: 0.02, label: "char reveal (s)" });

      const fb = pane.addFolder({ title: "逐字模糊 Blur-in" });
      fb.addInput(CONFIG.blur, "enabled", { label: "enabled" });
      fb.addInput(CONFIG.blur, "amount", { min: 0, max: 12, step: 0.5, label: "blur (px)" });
      fb.addInput(CONFIG.blur, "rise", { min: 0, max: 40, step: 1, label: "rise (%)" });

      const fc = pane.addFolder({ title: "光标 Caret" });
      fc.addInput(CONFIG.caret, "enabled", { label: "enabled" });
      fc.addInput(CONFIG.caret, "blink", { min: 0.2, max: 1.2, step: 0.05, label: "blink (s)" });

      const fs = pane.addFolder({ title: "扫光 Shimmer" });
      fs.addInput(CONFIG.shimmer, "enabled", { label: "enabled" });
      fs.addInput(CONFIG.shimmer, "duration", { min: 0.3, max: 1.5, step: 0.05, label: "sweep (s)" });

      const fr = pane.addFolder({ title: "螺旋星轨 Spiral trail" });
      fr.addInput(CONFIG.trail, "enabled", { label: "enabled" });
      fr.addInput(CONFIG.trail, "density", { min: 0.02, max: 0.12, step: 0.005, label: "spacing (↓ denser)" });
      fr.addInput(CONFIG.trail, "fadeOut", { min: 0.2, max: 1.5, step: 0.05, label: "star fade (s)" });
      fr.addInput(CONFIG.trail, "amplitude", { min: 10, max: 60, step: 2, label: "loop height (px)" });

      const fl = pane.addFolder({ title: "切换 Switching" });
      fl.addInput(CONFIG.loop, "hold", { min: 0.5, max: 5, step: 0.1, label: "hold per phrase (s)" });

      pane.addButton({ title: "恢复默认 Reset" }).on("click", () => {
        for (const group in DEFAULTS) Object.assign(CONFIG[group], DEFAULTS[group]);
        pane.refresh();   // push restored values back into the sliders/toggles
      });
    }
  </script>
</body>
</html>
