<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lark Base - AI Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --page-w: 1728px;
      --blue: #3f78ff;
      --blue-light: #7ab2ff;
      --text: #f4f8ff;
      --muted: rgba(191, 201, 219, 0.58);
      --nav: rgba(8, 12, 24, 0.82);
      --card-ease: cubic-bezier(0.65, 0, 0.35, 1);
    }

    html,
    body {
      min-height: 100%;
      background: #000;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 805px;
      overflow: hidden;
      background:
        radial-gradient(ellipse 660px 150px at 50% -4%, rgba(45, 103, 255, 0.38), transparent 72%),
        radial-gradient(ellipse 940px 250px at 50% 5%, rgba(30, 83, 211, 0.28), transparent 72%),
        linear-gradient(90deg, #020305 0%, #020814 18%, #06122c 50%, #020814 82%, #020305 100%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 820px 270px at 50% 9%, rgba(31, 104, 255, 0.27), transparent 70%),
        radial-gradient(ellipse 1240px 440px at 50% 58%, rgba(0, 0, 0, 0) 10%, #000 73%),
        linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, #000 76%);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 61px;
      left: 50%;
      width: 906px;
      height: 248px;
      transform: translateX(-50%);
      opacity: 0.26;
      background-image: radial-gradient(circle, rgba(63, 120, 255, 0.72) 0 1.15px, transparent 1.3px);
      background-size: 7.12px 7.12px;
      mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.75) 30%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.75) 30%, transparent 100%);
      pointer-events: none;
    }

    .nav {
      position: relative;
      z-index: 4;
      height: 60px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.9), var(--nav) 50%, rgba(0, 0, 0, 0.9));
    }

    .nav-inner {
      width: min(1376px, calc(100% - 80px));
      height: 60px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left,
    .nav-links,
    .nav-user {
      display: flex;
      align-items: center;
    }

    .nav-left {
      gap: 73px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 21px;
      font-weight: 700;
      white-space: nowrap;
    }

    .mark {
      position: relative;
      width: 26px;
      height: 26px;
      transform: rotate(45deg);
    }

    .mark span {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: linear-gradient(135deg, #9f55ff 0%, #5f32ff 100%);
    }

    .mark span:nth-child(1) { left: 0; top: 0; }
    .mark span:nth-child(2) { right: 0; top: 0; }
    .mark span:nth-child(3) { left: 0; bottom: 0; }
    .mark span:nth-child(4) { right: 0; bottom: 0; }

    .nav-links {
      gap: 40px;
      color: rgba(245, 248, 255, 0.92);
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      white-space: nowrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chevron {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid rgba(245, 248, 255, 0.7);
      transform: translateY(1px);
    }

    .nav-user {
      gap: 28px;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-name {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.88);
    }

    .user-name .chevron {
      border-left-width: 5px;
      border-right-width: 5px;
      border-top-width: 7px;
      border-top-color: rgba(245, 248, 255, 0.5);
    }

    .nav-cta {
      height: 36px;
      min-width: 100px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      color: #fff;
      background: linear-gradient(180deg, #467eff 0%, #2f6df3 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .headline {
      position: relative;
      z-index: 2;
      width: min(900px, calc(100% - 48px));
      margin: 60px auto 0;
      text-align: center;
    }

    .headline h1 {
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      color: #f3f7ff;
      font-size: 64px;
      font-weight: 600;
      line-height: 1.31;
      letter-spacing: 0;
    }

    .headline h1 .second {
      position: relative;
      display: block;
      min-height: 84px;
      color: transparent;
      background: var(--title-grad, linear-gradient(90deg, #ffffff 0%, #f1e8ff 45%, #b88fff 76%, #7a45ff 100%));
      -webkit-background-clip: text;
      background-clip: text;
    }

    .type-text {
      position: relative;
      display: inline-block;
      min-width: 5em;
      color: transparent;
      background: var(--title-grad, linear-gradient(90deg, #ffffff 0%, #f1e8ff 45%, #b88fff 76%, #7a45ff 100%));
      -webkit-background-clip: text;
      background-clip: text;
      text-align: center;
      white-space: nowrap;
      transform: translateZ(0);
      will-change: opacity, filter, transform;
      transition:
        opacity 220ms ease,
        filter 260ms ease,
        transform 320ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .type-text.is-exiting {
      opacity: 0;
    }

    .subtitle {
      margin-top: 20px;
      color: rgba(197, 207, 223, 0.58);
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
    }

    .hero-button {
      position: relative;
      z-index: 3;
      width: 164px;
      height: 62px;
      margin: 42px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 62px;
      background:
        radial-gradient(163.46% 163.46% at 50% 32.69%, rgba(0, 74, 247, 0.2) 0%, rgba(189, 209, 255, 0) 100%),
        linear-gradient(180deg, #69a5ff -19.17%, #185dff 10.62%, #7ba2ff 100%);
      box-shadow: inset 0 -1px 5px rgba(255, 255, 255, 0.55);
      color: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 28px;
    }

    .hero-button::before,
    .hero-button::after {
      content: "";
      position: absolute;
      left: 50%;
      z-index: -1;
      transform: translateX(-50%);
      border-radius: 50%;
      background: #3067e6;
      filter: blur(15.45px);
    }

    .hero-button::before {
      top: 38px;
      width: 170px;
      height: 36px;
      opacity: 0.6;
    }

    .hero-button::after {
      top: 48px;
      width: 104px;
      height: 19px;
    }

    .showcase {
      position: relative;
      z-index: 2;
      width: 1251px;
      max-width: calc(100% - 160px);
      height: 350px;
      margin: 19px auto 0;
    }

    .cards {
      position: absolute;
      left: 50%;
      top: 20px;
      width: 1100px;
      height: 269px;
      transform: translateX(-50%);
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .cards::after {
      content: "";
      position: absolute;
      inset: -28px -60px -34px;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.51) 0%, transparent 24%, transparent 76%, rgba(0, 0, 0, 0.51) 100%);
      pointer-events: none;
      z-index: 6;
    }

    .panel {
      position: absolute;
      left: 347px;
      top: 0;
      width: 406px;
      height: 269px;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backface-visibility: hidden;
      contain: layout paint;
      transform-origin: center center;
      will-change: opacity, transform;
      transition:
        opacity 760ms var(--card-ease),
        transform 760ms var(--card-ease);
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease 360ms;
      z-index: 2;
    }

    .panel.is-side {
      opacity: 0.78;
      z-index: 1;
    }

    .panel.is-left {
      transform: translate3d(-430px, 0, -150px) scale(0.788) rotateY(-6deg);
    }

    .panel.is-left::after,
    .panel.is-exit-left::after {
      opacity: 1;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0.28) 18%, transparent 44%);
    }

    .panel.is-right {
      transform: translate3d(430px, 0, -150px) scale(0.788) rotateY(6deg);
    }

    .panel.is-right::after,
    .panel.is-incoming::after {
      opacity: 1;
      background: linear-gradient(270deg, rgba(0, 0, 0, 0.78) 0%, rgba(0, 0, 0, 0.28) 18%, transparent 44%);
    }

    .panel.is-center {
      opacity: 1;
      z-index: 4;
      transform: translate3d(0, 0, 60px) scale(1) rotateY(0deg);
    }

    .panel.is-incoming {
      opacity: 0;
      z-index: 0;
      transform: translate3d(860px, 0, -210px) scale(0.788) rotateY(8deg);
    }

    .panel.is-exit-left {
      opacity: 0;
      z-index: 0;
      transform: translate3d(-860px, 0, -210px) scale(0.788) rotateY(-8deg);
    }

    .panel-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      pointer-events: none;
      user-select: none;
      backface-visibility: hidden;
      transform: translateZ(0);
    }

    .fade {
      position: absolute;
      top: 0;
      width: 298px;
      height: 350px;
      pointer-events: none;
    }

    .fade.left {
      left: 0;
      background: linear-gradient(90deg, #000 0%, rgba(0, 0, 0, 0.46) 38%, transparent 100%);
      z-index: 8;
    }

    .fade.right {
      right: 0;
      background: linear-gradient(270deg, #000 0%, rgba(0, 0, 0, 0.46) 38%, transparent 100%);
      z-index: 8;
    }

    @media (max-width: 1180px) {
      .nav-inner {
        width: calc(100% - 48px);
      }

      .nav-left {
        gap: 38px;
      }

      .nav-links {
        gap: 24px;
        font-size: 14px;
      }

      .nav-user {
        gap: 18px;
      }

      .headline h1 {
        font-size: 56px;
      }

      .showcase {
        max-width: calc(100% - 48px);
      }

      .cards {
        transform: translateX(-50%) scale(0.9);
        transform-origin: top center;
      }
    }

    @media (max-width: 780px) {
      .hero {
        min-height: 760px;
      }

      .nav-inner {
        width: calc(100% - 32px);
      }

      .nav-links,
      .user-name {
        display: none;
      }

      .brand {
        font-size: 19px;
      }

      .headline {
        margin-top: 82px;
      }

      .headline h1 {
        font-size: 44px;
        line-height: 1.25;
      }

      .headline h1 .second {
        min-height: 55px;
      }

      .subtitle {
        margin-top: 18px;
      }

      .hero-button {
        margin-top: 38px;
      }

      .showcase {
        height: 300px;
        margin-top: 28px;
      }

      .cards {
        transform: translateX(-50%) scale(0.62);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .panel,
      .type-text {
        transition: none;
        animation: none;
      }

    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Lark Base AI Agent landing page">
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-left">
          <div class="brand" aria-label="Lark Base">
            <div class="mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span>Lark Base</span>
          </div>
          <div class="nav-links" aria-label="Primary navigation">
            <span>多维表格 AI</span>
            <span class="nav-link">应用市场<i class="chevron" aria-hidden="true"></i></span>
            <span class="nav-link">解决方案<i class="chevron" aria-hidden="true"></i></span>
            <span class="nav-link">资源<i class="chevron" aria-hidden="true"></i></span>
            <span>价格</span>
            <span>社区</span>
          </div>
        </div>
        <div class="nav-user">
          <span class="user-name">李天天<i class="chevron" aria-hidden="true"></i></span>
          <span class="nav-cta">免费使用</span>
        </div>
      </div>
    </nav>

    <section class="headline">
      <h1>
        <span>用 AI Agent</span>
        <span class="second" aria-live="polite">
          <span class="type-text">搭专业系统</span>
        </span>
      </h1>
      <p class="subtitle">全新工作方式，开启智能未来</p>
    </section>

    <div class="hero-button">免费使用</div>

    <section class="showcase" aria-label="Product preview">
      <div class="cards">
        <div class="panel is-side is-left" data-panel="0"></div>
        <div class="panel is-center" data-panel="1"></div>
        <div class="panel is-side is-right" data-panel="2"></div>
        <div class="panel is-incoming" data-panel="3"></div>
      </div>
      <div class="fade left"></div>
      <div class="fade right"></div>
    </section>
  </main>
  <script>
    const slides = [
      { title: "跑业务流程", image: "assets/card-left.png", alt: "Business workflow preview", gradient: "linear-gradient(90deg, #ffffff 0%, #e8fff4 45%, #5fe0a3 76%, #15c774 100%)" },
      { title: "搭专业系统", image: "assets/card-center.png", alt: "Professional system builder preview", gradient: "linear-gradient(90deg, #ffffff 0%, #f1e8ff 45%, #b88fff 76%, #7a45ff 100%)" },
      { title: "生成公式", image: "assets/card-right.png", alt: "Formula generation preview", gradient: "linear-gradient(90deg, #ffffff 0%, #fff2e6 45%, #ffab63 76%, #ff7d1f 100%)" },
    ];

    const typeText = document.querySelector(".type-text");
    const secondEl = document.querySelector(".second");
    const panels = Array.from(document.querySelectorAll(".panel[data-panel]"));
    const slotClasses = ["is-side", "is-left", "is-center", "is-right", "is-incoming", "is-exit-left"];
    const typingSpeed = 92;
    const maskExitTime = 260;
    const holdTime = 1980;
    const slideTime = 760;
    let activeIndex = 1;

    slides.forEach((slide) => {
      const img = new Image();
      img.decoding = "async";
      img.src = slide.image;
    });

    function normalizedIndex(index) {
      return (index + slides.length) % slides.length;
    }

    function panelMarkup(slide) {
      return `<img class="panel-image" src="${slide.image}" alt="${slide.alt}">`;
    }

    function applyPanel(panel, slot, slideIndex) {
      panel.classList.remove(...slotClasses);
      if (slot === "is-center") {
        panel.classList.add("is-center");
      } else if (slot === "is-left") {
        panel.classList.add("is-side", "is-left");
      } else if (slot === "is-right") {
        panel.classList.add("is-side", "is-right");
      } else if (slot === "is-incoming") {
        panel.classList.add("is-incoming");
      } else {
        panel.classList.add("is-exit-left");
      }

      const nextSlideIndex = normalizedIndex(slideIndex);
      if (panel.dataset.slideIndex !== String(nextSlideIndex)) {
        panel.innerHTML = panelMarkup(slides[nextSlideIndex]);
        panel.dataset.slideIndex = String(nextSlideIndex);
      }
    }

    function renderPanels(index) {
      applyPanel(panels[0], "is-left", index - 1);
      applyPanel(panels[1], "is-center", index);
      applyPanel(panels[2], "is-right", index + 1);
      applyPanel(panels[3], "is-incoming", index + 2);
    }

    function slidePanels(nextIndex) {
      const transitionPlan = [
        ["is-exit-left", nextIndex - 2],
        ["is-left", nextIndex - 1],
        ["is-center", nextIndex],
        ["is-right", nextIndex + 1],
      ];

      panels.forEach((panel, i) => applyPanel(panel, transitionPlan[i][0], transitionPlan[i][1]));

      window.setTimeout(() => {
        panels.push(panels.shift());
        renderPanels(nextIndex);
      }, slideTime);
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function nextFrame() {
      return new Promise((resolve) => window.requestAnimationFrame(resolve));
    }

    function setPhrase(text) {
      typeText.textContent = text;
    }

    function applyGradient(index) {
      secondEl.style.setProperty("--title-grad", slides[normalizedIndex(index)].gradient);
    }

    async function typePhrase(text) {
      typeText.classList.remove("is-exiting");
      typeText.textContent = "";

      for (let i = 1; i <= text.length; i += 1) {
        typeText.textContent = text.slice(0, i);
        await wait(typingSpeed);
      }
    }

    async function fadePhrase() {
      typeText.classList.add("is-exiting");
      await wait(maskExitTime);
      typeText.classList.remove("is-exiting");
    }

    async function runHeroLoop() {
      renderPanels(activeIndex);
      applyGradient(activeIndex);
      setPhrase(slides[activeIndex].title);
      await wait(holdTime);

      while (true) {
        await fadePhrase();
        activeIndex = (activeIndex + 1) % slides.length;
        applyGradient(activeIndex);
        await Promise.all([
          typePhrase(slides[activeIndex].title),
          (async () => {
            await nextFrame();
            slidePanels(activeIndex);
            await wait(slideTime);
          })(),
        ]);
        await wait(holdTime);
      }
    }

    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      renderPanels(activeIndex);
      applyGradient(activeIndex);
    } else {
      runHeroLoop();
    }
  </script>
</body>
</html>
