<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lark Base - AI Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --page-w: 1728px;
      --blue: #3f78ff;
      --blue-light: #7ab2ff;
      --text: #f4f8ff;
      --muted: rgba(191, 201, 219, 0.58);
      --nav: rgba(8, 12, 24, 0.82);
    }

    html,
    body {
      min-height: 100%;
      background: #000;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 805px;
      overflow: hidden;
      background:
        radial-gradient(ellipse 660px 150px at 50% -4%, rgba(45, 103, 255, 0.38), transparent 72%),
        radial-gradient(ellipse 940px 250px at 50% 5%, rgba(30, 83, 211, 0.28), transparent 72%),
        linear-gradient(90deg, #020305 0%, #020814 18%, #06122c 50%, #020814 82%, #020305 100%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 820px 270px at 50% 9%, rgba(31, 104, 255, 0.27), transparent 70%),
        radial-gradient(ellipse 1240px 440px at 50% 58%, rgba(0, 0, 0, 0) 10%, #000 73%),
        linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, #000 76%);
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 61px;
      left: 50%;
      width: 906px;
      height: 248px;
      transform: translateX(-50%);
      opacity: 0.26;
      background-image: radial-gradient(circle, rgba(63, 120, 255, 0.72) 0 1.15px, transparent 1.3px);
      background-size: 7.12px 7.12px;
      mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.75) 30%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, rgba(0, 0, 0, 0.75) 30%, transparent 100%);
      pointer-events: none;
    }

    .nav {
      position: relative;
      z-index: 4;
      height: 60px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.9), var(--nav) 50%, rgba(0, 0, 0, 0.9));
    }

    .nav-inner {
      width: min(1376px, calc(100% - 80px));
      height: 60px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left,
    .nav-links,
    .nav-user {
      display: flex;
      align-items: center;
    }

    .nav-left {
      gap: 73px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 21px;
      font-weight: 700;
      white-space: nowrap;
    }

    .mark {
      position: relative;
      width: 26px;
      height: 26px;
      transform: rotate(45deg);
    }

    .mark span {
      position: absolute;
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: linear-gradient(135deg, #9f55ff 0%, #5f32ff 100%);
    }

    .mark span:nth-child(1) { left: 0; top: 0; }
    .mark span:nth-child(2) { right: 0; top: 0; }
    .mark span:nth-child(3) { left: 0; bottom: 0; }
    .mark span:nth-child(4) { right: 0; bottom: 0; }

    .nav-links {
      gap: 40px;
      color: rgba(245, 248, 255, 0.92);
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      white-space: nowrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chevron {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid rgba(245, 248, 255, 0.7);
      transform: translateY(1px);
    }

    .nav-user {
      gap: 28px;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .user-name {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.88);
    }

    .user-name .chevron {
      border-left-width: 5px;
      border-right-width: 5px;
      border-top-width: 7px;
      border-top-color: rgba(245, 248, 255, 0.5);
    }

    .nav-cta {
      height: 36px;
      min-width: 100px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      color: #fff;
      background: linear-gradient(180deg, #467eff 0%, #2f6df3 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
    }

    .headline {
      position: relative;
      z-index: 2;
      width: min(900px, calc(100% - 48px));
      margin: 60px auto 0;
      text-align: center;
    }

    .headline h1 {
      color: #f3f7ff;
      font-size: 64px;
      font-weight: 720;
      line-height: 1.31;
      letter-spacing: 0;
    }

    .headline h1 .second {
      position: relative;
      display: block;
      min-height: 84px;
      color: transparent;
      background: linear-gradient(90deg, #edf6ff 0%, #cfe5ff 28%, #94c3ff 54%, #65a8ff 74%, #3d86ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .type-text {
      display: inline-block;
      color: transparent;
      background: inherit;
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 1;
      transition: opacity 360ms ease;
    }

    .type-text.is-fading {
      opacity: 0;
    }

    .subtitle {
      margin-top: 20px;
      color: rgba(197, 207, 223, 0.58);
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
    }

    .hero-button {
      position: relative;
      z-index: 3;
      width: 164px;
      height: 62px;
      margin: 42px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 31px;
      background: linear-gradient(180deg, #296fff 0%, #3c80ff 54%, #81b5ff 100%);
      box-shadow:
        0 20px 34px rgba(51, 123, 255, 0.42),
        0 9px 15px rgba(110, 173, 255, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.48);
      color: #fff;
      font-size: 21px;
      font-weight: 700;
      line-height: 28px;
    }

    .hero-button::before,
    .hero-button::after {
      content: "";
      position: absolute;
      left: 50%;
      z-index: -1;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(57, 126, 255, 0.48);
      filter: blur(10px);
    }

    .hero-button::before {
      bottom: -12px;
      width: 170px;
      height: 36px;
    }

    .hero-button::after {
      bottom: -7px;
      width: 104px;
      height: 19px;
      background: rgba(141, 190, 255, 0.62);
    }

    .showcase {
      position: relative;
      z-index: 2;
      width: 1251px;
      max-width: calc(100% - 160px);
      height: 350px;
      margin: 19px auto 0;
    }

    .cards {
      position: absolute;
      left: 50%;
      top: 20px;
      width: 1100px;
      height: 269px;
      transform: translateX(-50%);
      perspective: 1200px;
      transform-style: preserve-3d;
    }

    .cards::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -38px;
      width: 520px;
      height: 228px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(68, 130, 255, 0.3) 0%, rgba(39, 91, 219, 0.13) 36%, transparent 72%);
      filter: blur(12px);
      pointer-events: none;
      z-index: 0;
    }

    .cards::after {
      content: "";
      position: absolute;
      inset: -28px -60px -34px;
      background:
        radial-gradient(ellipse 390px 230px at 50% 23%, rgba(93, 145, 255, 0.24), rgba(74, 118, 255, 0.06) 48%, transparent 70%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.51) 0%, transparent 24%, transparent 76%, rgba(0, 0, 0, 0.51) 100%);
      pointer-events: none;
      z-index: 6;
      mix-blend-mode: screen;
    }

    .panel {
      position: absolute;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        radial-gradient(ellipse 270px 85px at 50% 1%, rgba(55, 112, 255, 0.2), transparent 65%),
        linear-gradient(180deg, rgba(36, 39, 51, 0.72), rgba(10, 10, 12, 0.72));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      will-change: left, top, width, height, opacity, transform, filter;
      transition:
        left 760ms cubic-bezier(0.22, 1, 0.36, 1),
        top 760ms cubic-bezier(0.22, 1, 0.36, 1),
        width 760ms cubic-bezier(0.22, 1, 0.36, 1),
        height 760ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 760ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 760ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 760ms cubic-bezier(0.22, 1, 0.36, 1),
        border-color 760ms cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 760ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .panel.is-side {
      top: 28px;
      width: 320px;
      height: 212px;
      border-radius: 10px;
      opacity: 0.78;
      z-index: 1;
      filter: brightness(0.62) saturate(0.92);
    }

    .panel.is-left {
      left: 0;
      transform: translate3d(-36px, 0, -150px) rotateY(-6deg);
      mask-image: linear-gradient(90deg, transparent 0%, #000 22%, #000 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 22%, #000 100%);
    }

    .panel.is-right {
      left: 780px;
      transform: translate3d(36px, 0, -150px) rotateY(6deg);
      mask-image: linear-gradient(90deg, #000 0%, #000 78%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 78%, transparent 100%);
    }

    .panel.is-center {
      left: 347px;
      top: 0;
      width: 406px;
      height: 269px;
      border-radius: 14px;
      opacity: 1;
      z-index: 4;
      filter: brightness(1.1) saturate(1.08);
      transform: translate3d(0, 0, 60px) rotateY(0deg);
      border-color: rgba(255, 255, 255, 0.19);
      background:
        radial-gradient(ellipse 280px 104px at 50% 0%, rgba(53, 114, 255, 0.36), transparent 68%),
        linear-gradient(180deg, rgba(29, 31, 45, 0.88), rgba(18, 18, 25, 0.93));
      box-shadow:
        0 14px 80px rgba(17, 52, 131, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .panel.is-incoming {
      left: -382px;
      top: 28px;
      width: 320px;
      height: 212px;
      border-radius: 10px;
      opacity: 0;
      z-index: 0;
      filter: brightness(0.46) saturate(0.86);
      transform: translate3d(-42px, 0, -210px) rotateY(-8deg);
      mask-image: linear-gradient(90deg, transparent 0%, #000 22%, #000 100%);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 22%, #000 100%);
    }

    .panel.is-exit-right {
      left: 1162px;
      top: 28px;
      width: 320px;
      height: 212px;
      border-radius: 10px;
      opacity: 0;
      z-index: 0;
      filter: brightness(0.46) saturate(0.86);
      transform: translate3d(42px, 0, -210px) rotateY(8deg);
      mask-image: linear-gradient(90deg, #000 0%, #000 78%, transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 78%, transparent 100%);
    }

    .panel.is-center::before {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      top: 0;
      height: 32px;
      border-radius: 0 0 13px 13px;
      background: linear-gradient(180deg, rgba(25, 27, 39, 0.98), rgba(20, 21, 31, 0.84));
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .panel.is-center::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 139px;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(115, 167, 255, 0.48), transparent);
    }

    .panel-content {
      position: absolute;
      inset: 0;
      opacity: 0.88;
    }

    .panel-kicker {
      position: absolute;
      left: 28px;
      top: 54px;
      color: rgba(223, 232, 255, 0.34);
      font-size: 13px;
      font-weight: 600;
    }

    .panel-lines {
      position: absolute;
      left: 28px;
      right: 28px;
      top: 90px;
      display: grid;
      gap: 13px;
    }

    .panel-line {
      height: 9px;
      border-radius: 99px;
      background: linear-gradient(90deg, rgba(87, 139, 255, 0.25), rgba(233, 242, 255, 0.09));
    }

    .panel-line:nth-child(2) {
      width: 78%;
    }

    .panel-line:nth-child(3) {
      width: 56%;
    }

    .panel-chip {
      position: absolute;
      right: 24px;
      bottom: 23px;
      height: 26px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      border-radius: 99px;
      border: 1px solid rgba(118, 170, 255, 0.22);
      background: rgba(49, 104, 255, 0.11);
      color: rgba(214, 229, 255, 0.5);
      font-size: 12px;
      font-weight: 600;
    }

    .fade {
      position: absolute;
      top: 0;
      width: 298px;
      height: 350px;
      pointer-events: none;
    }

    .fade.left {
      left: 0;
      background: linear-gradient(90deg, #000 0%, rgba(0, 0, 0, 0.46) 38%, transparent 100%);
      z-index: 8;
    }

    .fade.right {
      right: 0;
      background: linear-gradient(270deg, #000 0%, rgba(0, 0, 0, 0.46) 38%, transparent 100%);
      z-index: 8;
    }

    @media (max-width: 1180px) {
      .nav-inner {
        width: calc(100% - 48px);
      }

      .nav-left {
        gap: 38px;
      }

      .nav-links {
        gap: 24px;
        font-size: 14px;
      }

      .nav-user {
        gap: 18px;
      }

      .headline h1 {
        font-size: 56px;
      }

      .showcase {
        max-width: calc(100% - 48px);
      }

      .cards {
        transform: translateX(-50%) scale(0.9);
        transform-origin: top center;
      }
    }

    @media (max-width: 780px) {
      .hero {
        min-height: 760px;
      }

      .nav-inner {
        width: calc(100% - 32px);
      }

      .nav-links,
      .user-name {
        display: none;
      }

      .brand {
        font-size: 19px;
      }

      .headline {
        margin-top: 82px;
      }

      .headline h1 {
        font-size: 44px;
        line-height: 1.25;
      }

      .headline h1 .second {
        min-height: 55px;
      }

      .subtitle {
        margin-top: 18px;
      }

      .hero-button {
        margin-top: 38px;
      }

      .showcase {
        height: 300px;
        margin-top: 28px;
      }

      .cards {
        transform: translateX(-50%) scale(0.62);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .panel,
      .type-text {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Lark Base AI Agent landing page">
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-left">
          <div class="brand" aria-label="Lark Base">
            <div class="mark" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span>Lark Base</span>
          </div>
          <div class="nav-links" aria-label="Primary navigation">
            <span>多维表格 AI</span>
            <span class="nav-link">应用市场<i class="chevron" aria-hidden="true"></i></span>
            <span class="nav-link">解决方案<i class="chevron" aria-hidden="true"></i></span>
            <span class="nav-link">资源<i class="chevron" aria-hidden="true"></i></span>
            <span>价格</span>
            <span>社区</span>
          </div>
        </div>
        <div class="nav-user">
          <span class="user-name">李天天<i class="chevron" aria-hidden="true"></i></span>
          <span class="nav-cta">免费使用</span>
        </div>
      </div>
    </nav>

    <section class="headline">
      <h1>
        <span>用 AI Agent</span>
        <span class="second" aria-live="polite">
          <span class="type-text">搭建专业系统</span>
        </span>
      </h1>
      <p class="subtitle">全新工作方式，开启智能未来</p>
    </section>

    <div class="hero-button">免费使用</div>

    <section class="showcase" aria-label="Product preview">
      <div class="cards">
        <div class="panel is-side is-left" data-panel="0"></div>
        <div class="panel is-center" data-panel="1"></div>
        <div class="panel is-side is-right" data-panel="2"></div>
        <div class="panel is-incoming" data-panel="3"></div>
      </div>
      <div class="fade left"></div>
      <div class="fade right"></div>
    </section>
  </main>
  <script>
    const slides = [
      { title: "搭建专业系统", label: "系统搭建", chip: "System" },
      { title: "生成业务流程", label: "流程编排", chip: "Workflow" },
      { title: "分析关键数据", label: "智能分析", chip: "Insight" },
      { title: "连接团队知识", label: "知识协同", chip: "Knowledge" },
    ];

    const typeText = document.querySelector(".type-text");
    const panels = Array.from(document.querySelectorAll(".panel[data-panel]"));
    const slotClasses = ["is-side", "is-left", "is-center", "is-right", "is-incoming", "is-exit-right"];
    const typingSpeed = 92;
    const fadeTime = 360;
    const holdTime = 1980;
    const slideTime = 760;
    let activeIndex = 0;

    function panelMarkup(slide) {
      return `
        <div class="panel-content">
          <div class="panel-kicker">${slide.label}</div>
          <div class="panel-lines">
            <div class="panel-line"></div>
            <div class="panel-line"></div>
            <div class="panel-line"></div>
          </div>
          <div class="panel-chip">${slide.chip}</div>
        </div>
      `;
    }

    function applyPanel(panel, slot, slideIndex) {
      panel.classList.remove(...slotClasses);
      if (slot === "is-center") {
        panel.classList.add("is-center");
      } else if (slot === "is-left") {
        panel.classList.add("is-side", "is-left");
      } else if (slot === "is-right") {
        panel.classList.add("is-side", "is-right");
      } else if (slot === "is-incoming") {
        panel.classList.add("is-incoming");
      } else {
        panel.classList.add("is-exit-right");
      }
      panel.innerHTML = panelMarkup(slides[(slideIndex + slides.length) % slides.length]);
    }

    function renderPanels(index) {
      applyPanel(panels[0], "is-left", index - 1);
      applyPanel(panels[1], "is-center", index);
      applyPanel(panels[2], "is-right", index + 1);
      applyPanel(panels[3], "is-incoming", index - 2);
    }

    function slidePanels(nextIndex) {
      const transitionPlan = [
        ["is-center", nextIndex],
        ["is-right", nextIndex + 1],
        ["is-exit-right", nextIndex + 2],
        ["is-left", nextIndex - 1],
      ];

      panels.forEach((panel, i) => applyPanel(panel, transitionPlan[i][0], transitionPlan[i][1]));

      window.setTimeout(() => {
        panels.unshift(panels.pop());
        renderPanels(nextIndex);
      }, slideTime);
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    async function typePhrase(text) {
      typeText.classList.remove("is-fading");
      typeText.textContent = "";
      for (let i = 1; i <= text.length; i += 1) {
        typeText.textContent = text.slice(0, i);
        await wait(typingSpeed);
      }
    }

    async function fadePhrase() {
      typeText.classList.add("is-fading");
      await wait(fadeTime);
      typeText.textContent = "";
      typeText.classList.remove("is-fading");
    }

    async function runHeroLoop() {
      renderPanels(activeIndex);
      await wait(holdTime);

      while (true) {
        await fadePhrase();
        activeIndex = (activeIndex + 1) % slides.length;
        slidePanels(activeIndex);
        await typePhrase(slides[activeIndex].title);
        await wait(holdTime);
      }
    }

    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      renderPanels(activeIndex);
    } else {
      runHeroLoop();
    }
  </script>
</body>
</html>
