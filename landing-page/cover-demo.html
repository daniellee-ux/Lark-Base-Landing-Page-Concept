<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    html, body { margin: 0; padding: 0; }

    .container {}

    /* ① wrapper：提供 100vh 的 sticky 滾動範圍 */
    .dark-wrap {
      position: relative;
      height: 200vh;
      z-index: 1;
    }

    /* ② dark sticky + 100vh */
    .dark {
      position: sticky;
      top: 0;
      height: 100vh;
      background-color: black;
      color: white;
      overflow: hidden;
      will-change: transform, filter, opacity, border-radius;
      transform-origin: center center;
      backface-visibility: hidden;
    }

    .title {
      text-align: center;
      margin-top: 50px;
    }

    .bottom {
      position: absolute;
      bottom: 50px;
      transform: translateX(-50%);
      left: 50%;
    }

    /* ③ light 用負 margin 拉回去蓋上 */
    .light {
      position: relative;
      z-index: 2;
      margin-top: -100vh;
      background-color: white;
      color: black;
      height: 1500px;
      width: 100%;
      will-change: border-radius, box-shadow;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="dark-wrap">
      <div class="dark">
        <h1 class="title">Lark Base</h1>
        <p class="bottom">AI Work OS for Every Business</p>
      </div>
    </div>
    <div class="light"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    const dark  = document.querySelector('.dark');
    const light = document.querySelector('.light');

    gsap.set(dark,  { scale: 1, opacity: 1, filter: 'blur(0px)', borderRadius: 0 });
    gsap.set(light, {
      borderTopLeftRadius: 28,
      borderTopRightRadius: 28,
      boxShadow: '0 0 0 rgba(0,0,0,0)',
    });

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: '.dark-wrap',
        start: 'top top',
        end: '+=100%',
        scrub: 1,
      },
    });

    tl.to(dark, {
      scale: 0.93,
      opacity: 0.55,
      filter: 'blur(4px)',
      borderRadius: 20,
      ease: 'power1.inOut',
      duration: 1,
    }, 0);

    tl.to(light, {
      borderTopLeftRadius: 0,
      borderTopRightRadius: 0,
      boxShadow: '0 -28px 90px rgba(0,0,0,0.55)',
      ease: 'none',
      duration: 1,
    }, 0);
  </script>
</body>
</html>
